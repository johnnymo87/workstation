name: Update opencode-patched

on:
  schedule:
    # Every 8 hours (1h after opencode-patched's sync-cached schedule)
    - cron: '0 2,10,18 * * *'
  workflow_dispatch:

concurrency:
  group: update-opencode-patched
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Check for new release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          file="users/dev/home.base.nix"

          # Current pinned identity from the nix file. home.base.nix derives
          # releaseTag/version from these two vars, so they are the source of truth.
          current_ver=$(grep 'upstreamVersion = ' "$file" | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          current_rev=$(grep 'patchedRevision = ' "$file" | head -1 | sed 's/.*patchedRevision = "\([^"]*\)".*/\1/')
          echo "current_ver=$current_ver" >> "$GITHUB_OUTPUT"
          echo "current_rev=$current_rev" >> "$GITHUB_OUTPUT"

          # Version hold (see `opencodePatchedHold` in home.base.nix). While
          # non-empty, track the highest revision on the held upstream line instead
          # of releases/latest, so an auto-bump can never carry us onto a new line
          # (e.g. the 1.16 line whose v2 schema migration corrupts opencode.db).
          # Empty = legacy behavior (track releases/latest faithfully).
          hold=$(grep 'opencodePatchedHold = ' "$file" | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "hold=$hold" >> "$GITHUB_OUTPUT"

          if [ -n "$hold" ]; then
            # Highest "vX-patched.N" on the held line (sort by the numeric .N field;
            # a base "vX-patched" with no .N sorts as 0, below any revision).
            latest_tag=$(gh api repos/johnnymo87/opencode-patched/releases --paginate \
              --jq ".[].tag_name | select(startswith(\"v${hold}-patched\"))" \
              | sort -t. -k4 -n | tail -1)
            if [ -z "$latest_tag" ]; then
              echo "Held at ${hold}; no v${hold}-patched* release found. Nothing to do."
              exit 0
            fi
          else
            # Latest published release, tracked faithfully (base "vX-patched" or a
            # manual "vX-patched.N" re-release -- whichever is marked latest). A
            # missing release (upstream build failure) is the blocker.
            latest_tag=$(gh api repos/johnnymo87/opencode-patched/releases/latest --jq '.tag_name')
          fi
          latest_ver=$(echo "$latest_tag" | sed 's/^v//;s/-patched.*//')
          latest_rev=$(echo "$latest_tag" | sed -n 's/.*-patched\.\([0-9][0-9]*\)$/\1/p')
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "latest_ver=$latest_ver" >> "$GITHUB_OUTPUT"
          echo "latest_rev=$latest_rev" >> "$GITHUB_OUTPUT"

          # Defense in depth: even if the selection above ever regressed, never
          # bump off the held line.
          if [ -n "$hold" ] && [ "$latest_ver" != "$hold" ]; then
            echo "Held at ${hold}; refusing to bump to ${latest_ver}."
            exit 0
          fi

          if [ "$current_ver" = "$latest_ver" ] && [ "$current_rev" = "$latest_rev" ]; then
            echo "Identity unchanged (v${current_ver}-patched${current_rev:+.$current_rev}); will check for hash drift."
          else
            echo "Release bump: v${current_ver}-patched${current_rev:+.$current_rev} -> ${latest_tag}"
          fi

      - name: Compute hashes
        id: hashes
        run: |
          base="https://github.com/johnnymo87/opencode-patched/releases/download/${{ steps.check.outputs.latest_tag }}"

          for asset in opencode-linux-arm64.tar.gz opencode-darwin-arm64.zip opencode-linux-x64.tar.gz opencode-darwin-x64.zip; do
            hash=$(nix-prefetch-url "${base}/${asset}" 2>/dev/null)
            sri=$(nix hash convert --hash-algo sha256 --to sri "$hash")
            # Convert asset name to output key: opencode-linux-arm64.tar.gz -> linux_arm64
            key=$(echo "$asset" | sed 's/opencode-//;s/\.tar\.gz//;s/\.zip//;s/-/_/')
            echo "${key}=${sri}" >> "$GITHUB_OUTPUT"
            echo "$asset -> $sri"
          done

      - name: Update home.base.nix
        run: |
          file="users/dev/home.base.nix"

          # Update the version identity. releaseTag/version in home.base.nix are
          # derived from these two vars, so we only rewrite upstreamVersion and
          # patchedRevision (latest_rev is "" for base releases, "N" for .N).
          sed -i "s/upstreamVersion = \"[^\"]*\"/upstreamVersion = \"${{ steps.check.outputs.latest_ver }}\"/" "$file"
          sed -i "s/\(patchedRevision = \)\"[^\"]*\"/\1\"${{ steps.check.outputs.latest_rev }}\"/" "$file"

          # Update hashes - match the line containing each asset name and replace the hash on that line
          sed -i '/opencode-linux-arm64\.tar\.gz/,/hash =/{s|hash = "sha256-[^"]*"|hash = "${{ steps.hashes.outputs.linux_arm64 }}"|;}' "$file"
          sed -i '/opencode-darwin-arm64\.zip/,/hash =/{s|hash = "sha256-[^"]*"|hash = "${{ steps.hashes.outputs.darwin_arm64 }}"|;}' "$file"
          sed -i '/opencode-linux-x64\.tar\.gz/,/hash =/{s|hash = "sha256-[^"]*"|hash = "${{ steps.hashes.outputs.linux_x64 }}"|;}' "$file"
          sed -i '/opencode-darwin-x64\.zip/,/hash =/{s|hash = "sha256-[^"]*"|hash = "${{ steps.hashes.outputs.darwin_x64 }}"|;}' "$file"

          echo "Updated $file to ${{ steps.check.outputs.latest_tag }}"
          git diff "$file"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.UPDATE_TOKEN }}
        run: |
          file="users/dev/home.base.nix"
          if git diff --quiet "$file"; then
            echo "No drift in $file; nothing to PR."
            exit 0
          fi

          version="${{ steps.check.outputs.latest_ver }}"
          tag="${{ steps.check.outputs.latest_tag }}"
          branch="auto/update-opencode-patched"

          git checkout -B "$branch"
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "chore(deps): update opencode-patched to ${version}"
          git push -u origin "$branch" --force

          # gh pr view matches merged/closed PRs too -- only skip if truly open
          pr_state=$(gh pr view "$branch" --json state -q '.state' 2>/dev/null || echo "NONE")
          if [ "$pr_state" = "OPEN" ]; then
            echo "PR already open for $branch, force-pushed update"
          else
            pr_url=$(gh pr create \
              --title "chore(deps): update opencode-patched to ${version}" \
              --body "Automated update of \`opencode-patched\` to \`${tag}\` (caching + vim)." \
              --label "dependencies,automated" \
              --head "$branch")
            pr_number=$(gh pr view "$branch" --json number -q '.number')
            gh pr merge "$pr_number" --auto --squash
          fi
