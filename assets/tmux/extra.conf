# Clipboard support
# Two mechanisms:
# 1. OSC 52: works over plain SSH (terminal escape sequences)
# 2. gclpr: works over mosh (TCP via SSH tunnel on port 2850)
#
# Both can coexist: set-clipboard handles OSC 52, copy-command handles gclpr.
# tmux uses copy-command when set; OSC 52 still works for apps that emit it directly.

# Accept OSC 52 clipboard commands (fallback for plain SSH sessions)
set -s set-clipboard on

# tmux 3.3+: passthrough escape sequences
set -gq allow-passthrough on

# Enable clipboard capability for common terminal types
set -as terminal-features ',xterm*:clipboard'
set -as terminal-features ',screen*:clipboard'
set -as terminal-features ',tmux*:clipboard'

# Pipe tmux copy-mode selections to gclpr on remote hosts (works through mosh).
# Guard: only set copy-command if the gclpr client key exists (remote hosts only).
# On macOS, tmux uses pbcopy/pbpaste natively via the default clipboard provider.
if-shell 'test -f ~/.gclpr/key' 'set -s copy-command "gclpr copy"'
